# R1: Audit decomposition on FEVER (claim verification)
# FEVER is the most directly aligned external benchmark for PCG-MAS:
# every accepted claim must be backed by retrievable evidence, exactly
# the contract certificate Z encodes.
#
# Wall time: ~25 min on M4 Pro with Qwen2.5-7B at 200 examples per seed.

dataset:
  name: fever
  split: labelled_dev
  n_examples: 200

backend:
  kind: hf_local
  model_name: Qwen/Qwen2.5-7B-Instruct
  dtype: float16
  load_in_4bit: false

prover:
  top_k: 4
  max_answer_tokens: 32       # FEVER labels are short (SUPPORTS / REFUTES / NEI)
  temperature: 0.0
  retriever: bm25

checker:
  entailment: exact_match
  case_insensitive: true

adversarial:
  enabled: true
  fraction: 0.30
  attack_kinds: [evidence_swap, schema_break, policy_violation]

stats:
  bootstrap_n: 2000
  alpha: 0.05

output_dir: results/r1_fever
