dataset:
  name: hotpotqa
  split: validation
  n_examples: 50
  streaming: true
backend:
  kind: hf_local
  model_name: meta-llama/Llama-3.1-8B-Instruct
  dtype: float16
  name: llama-3.1-8b
prover:
  top_k: 4
  max_answer_tokens: 64
  temperature: 0.0
  retrievers_for_branches:
  - bm25
  - dense
  - hybrid
  - bm25_with_query_paraphrase
checker:
  entailment: exact_match
  case_insensitive: true
independence:
  delta: 0.3
  kappa: 1
  provenance_level: publisher
  shingle_m: 5
k_values:
- 1
- 2
- 4
- 8
stats:
  bootstrap_n: 2000
  alpha: 0.05
output_dir: results/r2
output:
  base_dir: results/v4_matrix/local/hotpotqa__llama_3_1_8b/r2
run:
  dataset_name: hotpotqa
  backend_name: llama-3.1-8b
