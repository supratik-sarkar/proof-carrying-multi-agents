dataset:
  name: hotpotqa
  split: validation
  n_examples: 50
  streaming: true
backend:
  kind: hf_local
  model_name: meta-llama/Llama-3.1-8B-Instruct
  dtype: float16
  load_in_4bit: false
  name: llama-3.1-8b
prover:
  top_k: 4
  max_answer_tokens: 64
  temperature: 0.0
  retriever: bm25
checker:
  entailment: exact_match
  case_insensitive: true
adversarial:
  enabled: true
  fraction: 0.3
  attack_kinds:
  - evidence_swap
  - schema_break
  - policy_violation
stats:
  bootstrap_n: 2000
  alpha: 0.05
output_dir: results/r1
output:
  base_dir: results/v4_matrix/local/hotpotqa__llama_3_1_8b/r1
run:
  dataset_name: hotpotqa
  backend_name: llama-3.1-8b
