dataset:
  name: hotpotqa
  split: validation
  n_examples: 50
  streaming: true
backend:
  kind: hf_local
  model_name: deepseek-ai/deepseek-llm-7b-chat
  dtype: float16
  name: deepseek-llm-7b-chat
prover:
  top_k: 4
  max_answer_tokens: 64
  temperature: 0.0
  retriever: bm25
checker:
  entailment: exact_match
  case_insensitive: true
debugger:
  n_replays: 100
  alpha: 0.05
  use_paired_replay: true
  component_types:
  - truth
  - tool
  - delegation
  use_shapley: false
corruption_regimes:
- name: clean
  p_swap: 0.0
- name: light
  p_swap: 0.1
- name: heavy
  p_swap: 0.3
stats:
  bootstrap_n: 2000
  alpha: 0.05
output_dir: results/r3
output:
  base_dir: results/v4_matrix/local/hotpotqa__deepseek_llm_7b_chat/r3
run:
  dataset_name: hotpotqa
  backend_name: deepseek-llm-7b-chat
