# R5: Time / token overhead with multi-backend comparison
# Directly addresses ICML W2 ("missing details on time/token overhead")
# AND showcases performance across an open-weight model lineup.
#
# All backends listed below are open-weight; only Llama models are gated
# (require accepting the Meta license once on HuggingFace).

dataset:
  name: hotpotqa
  split: validation
  n_examples: 100

backends:
  # --- Always-available, no gate, no token strictly required ---
  - kind: hf_local
    model_name: microsoft/Phi-3.5-mini-instruct
    dtype: float16
  - kind: hf_local
    model_name: Qwen/Qwen2.5-7B-Instruct
    dtype: float16
  - kind: hf_local
    model_name: deepseek-ai/deepseek-llm-7b-chat
    dtype: float16

  # --- Optional gated comparators — uncomment after license acceptance ---
  # - kind: hf_local
  #   model_name: meta-llama/Llama-3.1-8B-Instruct
  #   dtype: float16
  # - kind: hf_local
  #   model_name: google/gemma-2-9b-it
  #   dtype: float16

  # --- Frontier comparison via free HF Inference API (no local GPU needed) ---
  # - kind: hf_inference
  #   model_name: meta-llama/Llama-3.3-70B-Instruct
  # - kind: hf_inference
  #   model_name: deepseek-ai/DeepSeek-V3

prover:
  top_k: 4
  max_answer_tokens: 64
  temperature: 0.0
  retriever: bm25

checker:
  entailment: exact_match

# Configurations to compare (this is the X-axis of the R5 stacked bar)
configurations:
  - name: baseline_no_pcg
    enable_pcg: false
  - name: pcg_k1
    enable_pcg: true
    k: 1
  - name: pcg_k2
    enable_pcg: true
    k: 2
  - name: pcg_k4
    enable_pcg: true
    k: 4

stats:
  bootstrap_n: 2000
  alpha: 0.05

output_dir: results/r5
