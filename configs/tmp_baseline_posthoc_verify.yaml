project_name: proof_carrying_multi_agents
output_dir: outputs

runtime:
  seed: 42
  max_examples: 10
  save_jsonl: true

model:
  backbone_name: "google/flan-t5-base"
  device: "auto"
  max_input_length: 1024
  max_new_tokens: 64
  do_sample: false
  temperature: 0.0

retrieval:
  top_k: 4
  bm25_top_k: 4
  dense_top_k: 4

experiment:
  mode: "baseline_posthoc_verify"
  dataset_name: "medmcqa"
  accepted_risk_threshold: 0.35

logging:
  include_text: false
  write_tables: true
  write_figures: true
