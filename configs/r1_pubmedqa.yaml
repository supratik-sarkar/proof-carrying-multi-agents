# R1: Audit decomposition on PubMedQA (biomedical, high-stakes)
# Tests scientific grounding where audit trails matter most for safety.
#
# Wall time: ~20 min on M4 Pro at 200 examples per seed (small abstract texts).

dataset:
  name: pubmedqa
  split: train                # PubMedQA labeled config has only `train`
  n_examples: 200

backend:
  kind: hf_local
  model_name: Qwen/Qwen2.5-7B-Instruct
  dtype: float16

prover:
  top_k: 4
  max_answer_tokens: 16       # final_decision is yes/no/maybe
  temperature: 0.0
  retriever: bm25

checker:
  entailment: exact_match
  case_insensitive: true

adversarial:
  enabled: true
  fraction: 0.30
  attack_kinds: [evidence_swap, schema_break, policy_violation]

stats:
  bootstrap_n: 2000
  alpha: 0.05

output_dir: results/r1_pubmedqa
